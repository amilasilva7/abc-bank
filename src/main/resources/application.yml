server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:abc-bank-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always

external:
  exchange-rate:
    url: https://open.er-api.com/v6/latest
